name: "Aether of Impact Production Build"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. سحب الكود من المستودع
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      # 2. تهيئة بيئة جافا المتوافقة مع Gradle الحديث (تمت الترقية إلى 21 لمنع انهيار البناء الصامت)
      - name: 2. Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. تهيئة بيئة نود
      - name: 3. Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 4. تنظيف المشروع وتثبيت الاعتماديات للعبة من الصفر
      - name: 4. Deep Clean & Install
        run: |
          rm -rf node_modules package-lock.json android ios dist
          npm install --legacy-peer-deps
          # تثبيت الإضافات الضرورية لضمان وجودها للعبة
          npm install @capacitor/core @capacitor/android @capacitor/haptics @capacitor/local-notifications --save --legacy-peer-deps
          npm run build

      # 5. تهيئة منصة أندرويد من الصفر تماماً
      - name: 5. Initialize Android (Fresh Start)
        run: |
          npx cap add android
          npx cap sync android

      # 6. حقن ملفات الهوية وتعديل مسميات اللعبة الجديدة (Aether of Impact)
      - name: 6. Inject App Identity & Configuration
        shell: bash
        run: |
          # ملفات الإعدادات المتولدة حديثاً من الصفر
          STRINGS="android/app/src/main/res/values/strings.xml"
          APP_GRADLE="android/app/build.gradle"
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          # تعديل اسم التطبيق ليصبح (أثير الأثر) والحزمة لـ (com.aether.impact)
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">أثير الأثر<\/string>/' $STRINGS
          sed -i 's/namespace ".*"/namespace "com.aether.impact"/' $APP_GRADLE
          sed -i 's/applicationId ".*"/applicationId "com.aether.impact"/' $APP_GRADLE
          
          # إضافة الأذونات اللازمة لتشغيل اللعبة والاهتزازات بنجاح
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.VIBRATE" />' $MANIFEST

      # 7. توليد الأيقونات وصور البداية للتطبيق
      - name: 7. Generate App Icons & Splash
        run: |
          mkdir -p assets
          # البحث عن الصور ونسخها للأصول
          find . -name "icon-only.png" -exec cp {} assets/icon-only.png \; || true
          find . -name "icon-background.png" -exec cp {} assets/icon-background.png \; || true
          find . -name "icon-foreground.png" -exec cp {} assets/icon-foreground.png \; || true
          npx capacitor-assets generate --android || echo "Skipped assets generation, no files found."

      # 8. بناء ملفات أندرويد الثنائية (Release) بالاعتماد على التجميع المتوافق مع Java 21
      - name: 8. Build Android Binaries
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"
          ./gradlew bundleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"

      # 9. توقيع ملفات الـ APK والـ AAB
      - name: 9. Sign APK & AAB
        run: |
          # توليد مفتاح توقيع مؤقت خاص باللعبة
          keytool -genkey -v -keystore aether_release.jks -alias aether_alias -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "aether_pass_2026" -keypass "aether_pass_2026" \
            -dname "CN=AetherDev, OU=GameDev, O=AetherImpact, L=Cairo, S=Egypt, C=EG"
          
          # توقيع الـ APK النهائي
          APK_PATH=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          /usr/local/lib/android/sdk/build-tools/34.0.0/apksigner sign --ks aether_release.jks \
            --ks-pass pass:"aether_pass_2026" --out Aether-Impact-Signed.apk "$APK_PATH"
          
          # توقيع الـ AAB النهائي للرفع على المتجر
          AAB_PATH=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -keystore aether_release.jks -storepass "aether_pass_2026" "$AAB_PATH" aether_alias
          cp "$AAB_PATH" Aether-Impact-Signed.aab

      # 10. نشر النسخة النهائية كـ Release على المستودع
      - name: 10. Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "أثير الأثر: الإصدار الإنتاجي رقم v${{ github.run_number }}"
          body: |
            مرحباً بك في عالم "أثير الأثر: رحلة المبعوث".
            تم بناء اللعبة بالكامل من الصفر بنجاح وتوقيعها كإصدار إنتاجي متكامل.
            
            الملفات المتاحة للتحميل في الأسفل:
            - **Aether-Impact-Signed.apk** (لتثبيت اللعبة مباشرة على هاتفك الأندرويد)
            - **Aether-Impact-Signed.aab** (الملف الخاص بالرفع على متجر Google Play للجمهور)
          files: |
            Aether-Impact-Signed.apk
            Aether-Impact-Signed.aab
            aether_release.jks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
